<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Agricola is the digital infrastructure for Botswana's agricultural future. Track crops, manage inventory, reduce post-harvest losses, and connect with buyers — all from your phone." />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Agricola" />
    <meta property="og:locale" content="en_BW" />
    <meta property="og:url" content="https://agricola-app.com/" />
    <meta property="og:title" content="Agricola - Empowering Botswana Farmers" />
    <meta property="og:description" content="The digital infrastructure for Botswana's agricultural future. Smarter tracking. Less waste. Higher yields." />

    <meta name="twitter:title" content="Agricola - Empowering Botswana Farmers" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Agricola",
          "url": "https://agricola-app.com",
          "logo": "https://agricola-app.com/images/logo.jpg",
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+267-78-210-642",
            "email": "dumelang@agricola-app.com",
            "contactType": "customer service"
          }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Agricola",
          "operatingSystem": "Android",
          "applicationCategory": "BusinessApplication",
          "url": "https://agricola-app.com",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "BWP"
          },
          "installUrl": "https://play.google.com/store/apps/details?id=com.agricola.prod",
          "description": "Track crops, manage inventory, reduce post-harvest losses, and connect with buyers."
        }
      ]
    }
    </script>

    <!-- Google Analytics 4 — conditional on VITE_GA_MEASUREMENT_ID being set -->
    <script>
    (function() {
      var id = '%VITE_GA_MEASUREMENT_ID%';
      if (!id || id.charAt(0) === '%') return;
      var s = document.createElement('script');
      s.async = true; s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      window.gtag = function(){window.dataLayer.push(arguments);};
      window.gtag('js', new Date());
      window.gtag('config', id, { send_page_view: false });
    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
